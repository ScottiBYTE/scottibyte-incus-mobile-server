<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ScottiBYTE Incus Mobile Server Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #0b1020;
      --panel: #111827;
      --border: #253047;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #1e293b, var(--bg) 42%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .login {
      width: min(440px, calc(100vw - 32px));
      background: linear-gradient(180deg, rgba(17,24,39,0.98), rgba(15,23,42,0.98));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.45rem;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    label {
      display: block;
      margin: 12px 0 5px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      background: #020617;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px;
      font-size: 1rem;
    }

    button {
      margin-top: 18px;
      width: 100%;
      border: 1px solid rgba(96,165,250,0.75);
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      color: white;
      border-radius: 10px;
      padding: 11px;
      font-weight: 800;
      cursor: pointer;
    }

    .secondary {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
      margin-top: 10px;
    }

    .error {
      display: none;
      margin-top: 12px;
      color: #fecaca;
      background: rgba(127,29,29,0.35);
      border: 1px solid rgba(239,68,68,0.55);
      border-radius: 10px;
      padding: 10px;
    }

    .note {
      margin-top: 14px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }
  </style>
</head>
<body>
  <form class="login" id="passwordForm" method="post" action="/admin/login" autocomplete="on" novalidate>
    <h1>ScottiBYTE Incus Mobile Server</h1>
    <p>Admin login requires password and 2FA.</p>

    <div id="passwordStep" class="step active">
      <label for="username">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        autocomplete="username"
        spellcheck="false"
        autocapitalize="none"
        required
      >

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        autocomplete="current-password"
        required
      >

      <button id="continueBtn" type="button">Continue</button>
    </div>

    <div id="totpStep" class="step">
      <label for="token">2FA Code</label>
      <input
        id="token"
        name="token"
        type="text"
        inputmode="numeric"
        pattern="[0-9]*"
        autocomplete="one-time-code"
        placeholder="123456"
      >

      <button id="signInBtn" type="button">Sign In</button>
      <button id="backBtn" class="secondary" type="button">Back</button>
    </div>

    <div id="error" class="error"></div>
    <div class="note">Admin access should remain LAN/VPN-only unless WAN admin mode is explicitly enabled with strong authentication.</div>
  </form>

  <script>
    const form = document.getElementById('passwordForm');
    const error = document.getElementById('error');
    const passwordStep = document.getElementById('passwordStep');
    const totpStep = document.getElementById('totpStep');
    const tokenInput = document.getElementById('token');
    const signInBtn = document.getElementById('signInBtn');
    const backBtn = document.getElementById('backBtn');

    function showError(message) {
      error.textContent = message;
      error.style.display = 'block';
    }

    function clearError() {
      error.textContent = '';
      error.style.display = 'none';
    }

    function showTotpStep() {
      passwordStep.classList.remove('active');
      totpStep.classList.add('active');
      tokenInput.focus();
    }

    function showPasswordStep() {
      totpStep.classList.remove('active');
      passwordStep.classList.add('active');
      document.getElementById('password').focus();
    }

    document.getElementById('continueBtn').addEventListener('click', () => {
      clearError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Username and password are required');
        return;
      }

      showTotpStep();
    });

    form.addEventListener('submit', (event) => {
      event.preventDefault();
    });

    signInBtn.addEventListener('click', async () => {
      clearError();

      const token = tokenInput.value.trim();

      if (!token) {
        showError('2FA code is required');
        tokenInput.focus();
        return;
      }

      const body = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
        token
      };

      const res = await fetch('/api/admin/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok || data.ok === false) {
        showError(data.error || 'Login failed');
        return;
      }

      window.location.href = '/admin';
    });

    tokenInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        signInBtn.click();
      }
    });

    backBtn.addEventListener('click', showPasswordStep);
  </script>
</body>
</html>
